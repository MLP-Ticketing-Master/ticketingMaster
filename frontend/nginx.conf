server {
    listen 80;

    # SPA 라우팅 — 새로고침 시 404 방지 위해 index.html 폴백
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # 좌석/구역 조회 GET 응답 캐시 3초 — 백엔드 직렬화+gzip CPU 오프로드
    # POST(reserve 등)는 GET/HEAD 만 캐시되어 자동 제외, 좌석 상태 변동은 짧은 TTL + 예매단 낙관적 락으로 흡수
    location /api/matches/ {
        proxy_pass http://backend:8080/matches/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache seatcache;
        proxy_cache_valid 200 3s;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # /api 요청은 백엔드로 프록시 (끝 슬래시로 /api 접두사 제거)
    # 예: /api/auth/login → backend:8080/auth/login
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}