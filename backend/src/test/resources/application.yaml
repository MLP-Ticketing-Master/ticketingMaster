# 테스트 환경 전용 설정 (main 의 application.yaml 을 통째로 대체)
# - 같은 파일명이라 main yaml 이 shadow 되므로, 통합 테스트에 필요한 모든 설정을 여기 두어야 함
# - jwt.secret 만 더미값으로 override (운영 키 절대 아님 / HS256 32바이트 충족용)
# - 그 외 datasource/redis/jpa/mail 등은 main 과 동일

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: backend

  datasource:
    url: jdbc:oracle:thin:@localhost:1522/FREEPDB1
    username: ${ORACLE_USER}
    password: ${ORACLE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  data:
    redis:
      host: localhost
      port: 6380

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 100
          batch_versioned_data: true
        order_inserts: true
        order_updates: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

logging:
  level:
    com.ticketmaster.backend: DEBUG
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

jwt:
  # 테스트 전용 더미값 — 운영 키 아님
  secret: test-jwt-secret-key-for-testing-only-must-be-long-enough-for-hs256-algorithm
  access-expiration: 1800000
  refresh-expiration: 1209600000
