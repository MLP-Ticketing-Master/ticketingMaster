spring:
  application:
    name: backend

  datasource:
    url: jdbc:mysql://localhost:3308/ticketing_master?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ticketmaster
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6380

  jpa:
    hibernate:
      ddl-auto: update   # 개발용: 엔티티 변경 시 테이블 자동 반영
    show-sql: true       # 콘솔에 SQL 출력
    properties:
      hibernate:
        format_sql: true # SQL 예쁘게 출력
        highlight_sql: true # SQL 색상 하이라이팅 (콘솔에서 보기 편함)

  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

logging:
  level:
    com.ticketmaster.backend: DEBUG