spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: backend
  profiles:
    active: dev

  datasource:
    # 호스트 포트는 docker-compose에 고정(1522)
    url: jdbc:oracle:thin:@localhost:1522/FREEPDB1
    username: ${ORACLE_USER}
    password: ${ORACLE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  data:
    redis:
      host: localhost
      port: 6380

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: update   # 개발용: 엔티티 변경 시 테이블 자동 반영
    show-sql: true       # 콘솔에 SQL 출력
    properties:
      hibernate:
        format_sql: true # SQL 예쁘게 출력
        highlight_sql: true # SQL 색상 하이라이팅 (콘솔에서 보기 편함)
        default_batch_fetch_size: 100 # 조회 시 lazy 로딩을 IN 쿼리로 묶어 N+1 방지 (SELECT 최적화)
        jdbc:
          batch_size: 100              # 100건씩 묶어서 INSERT
          batch_versioned_data: true
        order_inserts: true            # INSERT 문 정렬 (배치 효율 ↑)
        order_updates: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true  # 보안 연결(TLS) 활성화

  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

logging:
  level:
    com.ticketmaster.backend: DEBUG
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
  refresh-expiration: 1209600000

# 좌석 점유 정책
seat:
  # 점유 TTL — 결제 안 하면 이 시간 뒤 자동 해제 (7분)
  reservation-ttl-seconds: 420
  # 만료 좌석 스캐너 실행 간격 (30초)
  expiry-scan-interval-ms: 30000

queue:
  # 대기열 토큰 만료(초) — 좌석 진입까지 충분한 시간 + 비정상 종료 시 자동 청소
  token-ttl-seconds: 1800       # 30분
  # 한 번에 처리하는 입장 인원
  admission-batch-size: 200
  # 입장 승격 스케줄러 주기(초)
  admission-interval-seconds: 30